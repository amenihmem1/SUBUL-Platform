apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: subul
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi   # taille de ton disque
  storageClassName: gp2 # ou gp3 sur AWS (vérifie ton cluster)



apiVersion: v1
kind: Namespace
metadata:
  name: subul

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: subul
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: subul
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql/pg_hba.conf
          subPath: pg_hba.conf
        volumes:
        - name: postgres-data
          persistentVolumeClaim:
          claimName: postgres-pvc

      - name: postgres-config
        configMap:
          name: postgres-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: subul
data:
  pg_hba.conf: |
    local   all   all   md5
    host    all   all   0.0.0.0/0   md5
#done done 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: subul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 014498640042.dkr.ecr.eu-central-1.amazonaws.com/backend-ecr-subul-main:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: FRONTEND_URL
          value: "https://subul.uk"
        - name: BACKEND_URL
          value: "https://app.subul.uk"
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "1"
          limits:
            memory: "2Gi"
            cpu: "2"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: subul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 014498640042.dkr.ecr.eu-central-1.amazonaws.com/frontend-ecr-subul-main:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
#change backend
