---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: subul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.2.1
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: subul
spec:
  selector:
    app: kafka
  ports:
  - protocol: TCP
    port: 9092
    targetPort: 9092
  type: ClusterIP

---
# ──────────────────────────────────────────────────────────────────────────────
# JOB SCRAPER / CONSUMER / PREFECT-AGENT
# Image unique construite depuis jobsearchsubul/Dockerfile (build context = repo root).
#
# AVANT d'appliquer : remplacer YOUR_ACR par votre Azure Container Registry login server.
#
# Build & push :
#   az acr login -n YOUR_ACR
#   docker build -f jobsearchsubul/Dockerfile -t YOUR_ACR.azurecr.io/subul-job-scraper:latest .
#   docker push YOUR_ACR.azurecr.io/subul-job-scraper:latest
#
# Si AKS n'a pas d'intégration ACR native (az aks update --attach-acr), ajouter :
#   imagePullSecrets: [{ name: acr-pull }]   dans chaque spec.template.spec
# ──────────────────────────────────────────────────────────────────────────────

# job-scraper → CronJob (pas un Deployment) car scrapmain.py tourne une fois et quitte.
# Schedule : toutes les heures. Modifier SCRAPE_INTERVAL_CRON selon vos besoins.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: job-scraper
  namespace: subul
spec:
  schedule: "0 * * * *"          # toutes les heures ; ex: "*/30 * * * *" = toutes les 30 min
  concurrencyPolicy: Forbid       # interdit deux exécutions simultanées
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: job-scraper
        spec:
          restartPolicy: OnFailure
          containers:
          - name: job-scraper
            image: YOUR_ACR.azurecr.io/subul-job-scraper:latest
            imagePullPolicy: Always
            command: ["python", "-m", "jobsearchsubul.tools.scrapmain"]
            env:
            - name: SCRAPER_MODE
              value: "minimal"    # passer à "full" quand les scrapers supplémentaires seront ajoutés
            envFrom:
            - secretRef:
                name: app-secrets
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "1Gi"
                cpu: "1"

---
# job-consumer → Deployment long-running.
# Idle proprement si KAFKA_BOOTSTRAP_SERVERS est absent dans app-secrets.
# Consomme le topic job-raw dès que Kafka est opérationnel.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-consumer
  namespace: subul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-consumer
  template:
    metadata:
      labels:
        app: job-consumer
    spec:
      containers:
      - name: job-consumer
        image: YOUR_ACR.azurecr.io/subul-job-scraper:latest
        imagePullPolicy: Always
        command: ["python3", "-m", "jobsearchsubul.tools.consumer"]
        env:
        - name: SKIP_DB_WAIT
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          exec:
            command: ["python3", "-c", "import os; os.kill(1, 0)"]
          initialDelaySeconds: 30
          periodSeconds: 60

---
# prefect-server → Deployment long-running.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  namespace: subul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
    spec:
      containers:
      - name: prefect-server
        image: prefecthq/prefect:2-python3.11
        command: ["prefect", "server", "start", "--host", "0.0.0.0"]
        ports:
        - containerPort: 4200
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: app-secrets
        volumeMounts:
        - name: prefect-data
          mountPath: /root/.prefect
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4200
          initialDelaySeconds: 20
          periodSeconds: 10
      volumes:
      - name: prefect-data
        emptyDir: {}

---
# prefect-agent → Deployment long-running.
# Attend que prefect-server soit prêt, exécute deployment.py (stub → réussit toujours),
# puis démarre l'agent sur la queue "default".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-agent
  namespace: subul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-agent
  template:
    metadata:
      labels:
        app: prefect-agent
    spec:
      containers:
      - name: prefect-agent
        image: YOUR_ACR.azurecr.io/subul-job-scraper:latest
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - |
          echo '[prefect-agent] Waiting for Prefect Server...'
          until curl -sf http://prefect-server:4200/api/health >/dev/null; do
            sleep 5
          done
          echo '[prefect-agent] Server ready. Running deployment bootstrap...'
          python3 -m jobsearchsubul.tools.deployment
          echo '[prefect-agent] Starting agent on queue: default'
          exec prefect agent start -q default
        env:
        - name: PREFECT_API_URL
          value: "http://prefect-server:4200/api"
        - name: PREFECT_AGENT_QUEUE_NAME
          value: "default"
        - name: LOG_LEVEL
          value: "INFO"
        envFrom:
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"


