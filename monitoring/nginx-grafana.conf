# Nginx reverse proxy for Grafana — monitoring.subul.uk
# Deploy path on server: /etc/nginx/sites-available/monitoring.subul.uk
# Then: ln -s /etc/nginx/sites-available/monitoring.subul.uk /etc/nginx/sites-enabled/
#
# Run setup script first: monitoring/setup-grafana-nginx.sh

server {
    listen 80;
    server_name monitoring.subul.uk;
    # Certbot will replace this block automatically
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name monitoring.subul.uk;

    # Certificates managed by Certbot — paths populated by: certbot --nginx -d monitoring.subul.uk
    ssl_certificate     /etc/letsencrypt/live/monitoring.subul.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitoring.subul.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # Optional: restrict to specific IPs (uncomment + edit to limit access)
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass         http://localhost:3005;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Grafana live updates)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
