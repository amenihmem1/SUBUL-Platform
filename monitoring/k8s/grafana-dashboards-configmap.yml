apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: default
data:
  agents-health.json: |
    {
      "title": "Subul — Agents Health",
      "uid": "subul-agents",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "tags": ["subul", "agents"],
      "templating": {
        "list": [
          {
            "name": "agent",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(azure_openai_requests_total, agent)",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Agent"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "cloud-tutor",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 3 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "probe_success{instance=~\".*agent-cloud-tutor.*\"}", "legendFormat": "" }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "quiz",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 3 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "probe_success{instance=~\".*agent-quiz.*\"}", "legendFormat": "" }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "roadmap",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 3 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "probe_success{instance=~\".*agent-roadmap.*\"}", "legendFormat": "" }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "coach",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 3 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "probe_success{instance=~\".*agent-coach.*\"}", "legendFormat": "" }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "cv-booster",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 3 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "probe_success{instance=~\".*agent-cv.*\"}", "legendFormat": "" }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "job-search",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 3 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "probe_success{instance=~\".*agent-job.*\"}", "legendFormat": "" }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Request Rate by Agent (req/s)",
          "gridPos": { "x": 0, "y": 3, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (rate(azure_openai_requests_total{agent=~\"$agent\"}[5m]))",
              "legendFormat": "{{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 8 } }
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Request Duration P95 by Agent (s)",
          "gridPos": { "x": 12, "y": 3, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by(agent, le) (rate(azure_openai_request_duration_seconds_bucket{agent=~\"$agent\"}[5m])))",
              "legendFormat": "p95 {{agent}}"
            },
            {
              "expr": "histogram_quantile(0.50, sum by(agent, le) (rate(azure_openai_request_duration_seconds_bucket{agent=~\"$agent\"}[5m])))",
              "legendFormat": "p50 {{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Error Rate by Agent (%)",
          "gridPos": { "x": 0, "y": 11, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (rate(azure_openai_requests_total{agent=~\"$agent\", status=\"error\"}[5m])) / sum by(agent) (rate(azure_openai_requests_total{agent=~\"$agent\"}[5m])) * 100",
              "legendFormat": "{{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "lineWidth": 2 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 10 }] }
            }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Tokens per Minute by Agent",
          "gridPos": { "x": 12, "y": 11, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (rate(azure_openai_total_tokens_total{agent=~\"$agent\"}[5m])) * 60",
              "legendFormat": "total {{agent}}"
            },
            {
              "expr": "sum by(agent) (rate(azure_openai_prompt_tokens_total{agent=~\"$agent\"}[5m])) * 60",
              "legendFormat": "prompt {{agent}}"
            },
            {
              "expr": "sum by(agent) (rate(azure_openai_completion_tokens_total{agent=~\"$agent\"}[5m])) * 60",
              "legendFormat": "completion {{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 5 } }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Azure Search Queries / Failures",
          "gridPos": { "x": 0, "y": 19, "w": 12, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (rate(azure_search_requests_total{agent=~\"$agent\", success=\"true\"}[5m]))",
              "legendFormat": "ok {{agent}}"
            },
            {
              "expr": "sum by(agent) (rate(azure_search_requests_total{agent=~\"$agent\", success=\"false\"}[5m]))",
              "legendFormat": "fail {{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Paid API Failures (any provider)",
          "gridPos": { "x": 12, "y": 19, "w": 12, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent, provider) (rate(paid_api_failures_total{agent=~\"$agent\"}[5m]))",
              "legendFormat": "{{agent}} / {{provider}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 },
              "color": { "fixedColor": "red", "mode": "fixed" }
            }
          }
        }
      ]
    }
  ai-cost.json: |
    {
      "title": "Subul — AI Cost & Usage",
      "uid": "subul-ai-cost",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-24h", "to": "now" },
      "tags": ["subul", "ai", "cost"],
      "templating": {
        "list": [
          {
            "name": "agent",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(azure_openai_cost_usd_total, agent)",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Agent"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total AI Cost Today",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(azure_openai_cost_usd_total[24h])) + sum(increase(deepgram_cost_usd_total[24h])) + sum(increase(cartesia_cost_usd_total[24h])) + sum(increase(azure_search_cost_usd_total[24h]))",
              "legendFormat": "Today"
            }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 25 }, { "color": "red", "value": 50 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "OpenAI Cost Today",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(increase(azure_openai_cost_usd_total[24h]))", "legendFormat": "" }],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 2, "color": { "mode": "palette-classic" } } }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Deepgram Cost Today",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(increase(deepgram_cost_usd_total[24h]))", "legendFormat": "" }],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 2, "color": { "mode": "palette-classic" } } }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Cartesia Cost Today",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(increase(cartesia_cost_usd_total[24h]))", "legendFormat": "" }],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 2, "color": { "mode": "palette-classic" } } }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Azure Search Cost Today",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(increase(azure_search_cost_usd_total[24h]))", "legendFormat": "" }],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 2, "color": { "mode": "palette-classic" } } }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Total AI Cost This Month",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(azure_openai_cost_usd_total[30d])) + sum(increase(deepgram_cost_usd_total[30d])) + sum(increase(cartesia_cost_usd_total[30d])) + sum(increase(azure_search_cost_usd_total[30d]))",
              "legendFormat": "Month"
            }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 500 }, { "color": "red", "value": 1000 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 10,
          "type": "piechart",
          "title": "Cost by Provider (last 24h)",
          "gridPos": { "x": 0, "y": 4, "w": 8, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sum(increase(azure_openai_cost_usd_total[24h]))", "legendFormat": "OpenAI", "refId": "A" },
            { "expr": "sum(increase(deepgram_cost_usd_total[24h]))", "legendFormat": "Deepgram", "refId": "B" },
            { "expr": "sum(increase(cartesia_cost_usd_total[24h]))", "legendFormat": "Cartesia", "refId": "C" },
            { "expr": "sum(increase(azure_search_cost_usd_total[24h]))", "legendFormat": "Azure Search", "refId": "D" }
          ],
          "options": { "pieType": "donut", "displayLabels": ["name", "percent"] },
          "fieldConfig": { "defaults": { "unit": "currencyUSD" } }
        },
        {
          "id": 11,
          "type": "piechart",
          "title": "OpenAI Cost by Agent (last 24h)",
          "gridPos": { "x": 8, "y": 4, "w": 8, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (increase(azure_openai_cost_usd_total[24h]))",
              "legendFormat": "{{agent}}"
            }
          ],
          "options": { "pieType": "donut", "displayLabels": ["name", "percent"] },
          "fieldConfig": { "defaults": { "unit": "currencyUSD" } }
        },
        {
          "id": 12,
          "type": "table",
          "title": "Cost by Agent (last 24h)",
          "gridPos": { "x": 16, "y": 4, "w": 8, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (increase(azure_openai_cost_usd_total[24h]))",
              "instant": true,
              "legendFormat": "{{agent}}",
              "refId": "A"
            }
          ],
          "options": { "sortBy": [{ "displayName": "Value #A", "desc": true }] },
          "fieldConfig": {
            "defaults": { "unit": "currencyUSD", "decimals": 4 },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Value #A" }, "properties": [{ "id": "displayName", "value": "Cost (USD)" }] }
            ]
          }
        },
        {
          "id": 20,
          "type": "timeseries",
          "title": "AI Cost Rate by Provider (USD/hr)",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sum(rate(azure_openai_cost_usd_total[10m])) * 3600", "legendFormat": "OpenAI" },
            { "expr": "sum(rate(deepgram_cost_usd_total[10m])) * 3600", "legendFormat": "Deepgram" },
            { "expr": "sum(rate(cartesia_cost_usd_total[10m])) * 3600", "legendFormat": "Cartesia" },
            { "expr": "sum(rate(azure_search_cost_usd_total[10m])) * 3600", "legendFormat": "Azure Search" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "currencyUSD", "custom": { "lineWidth": 2, "fillOpacity": 10, "stacking": { "mode": "normal" } } }
          }
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "OpenAI Cost by Agent (USD/hr)",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (rate(azure_openai_cost_usd_total{agent=~\"$agent\"}[10m])) * 3600",
              "legendFormat": "{{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "currencyUSD", "custom": { "lineWidth": 2, "fillOpacity": 5 } }
          }
        },
        {
          "id": 22,
          "type": "timeseries",
          "title": "Token Usage by Agent (tokens/min)",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (rate(azure_openai_prompt_tokens_total{agent=~\"$agent\"}[5m])) * 60",
              "legendFormat": "prompt {{agent}}"
            },
            {
              "expr": "sum by(agent) (rate(azure_openai_completion_tokens_total{agent=~\"$agent\"}[5m])) * 60",
              "legendFormat": "completion {{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 1 } }
          }
        },
        {
          "id": 30,
          "type": "timeseries",
          "title": "Deepgram Audio Seconds Processed",
          "gridPos": { "x": 0, "y": 28, "w": 8, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(user_tier) (rate(deepgram_audio_seconds_total[5m])) * 60",
              "legendFormat": "{{user_tier}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 31,
          "type": "timeseries",
          "title": "Cartesia Characters Synthesized",
          "gridPos": { "x": 8, "y": 28, "w": 8, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(user_tier) (rate(cartesia_characters_total[5m])) * 60",
              "legendFormat": "{{user_tier}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 32,
          "type": "table",
          "title": "Top 10 Expensive Agents (last 24h)",
          "gridPos": { "x": 16, "y": 28, "w": 8, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "topk(10, sum by(agent) (increase(azure_openai_cost_usd_total[24h])))",
              "instant": true,
              "legendFormat": "{{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "currencyUSD", "decimals": 4 }
          }
        },
        {
          "id": 40,
          "type": "table",
          "title": "Paid API Failures (last 1h)",
          "gridPos": { "x": 0, "y": 35, "w": 24, "h": 6 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent, provider, error_type) (increase(paid_api_failures_total[1h]))",
              "instant": true,
              "legendFormat": "{{agent}} / {{provider}} / {{error_type}}"
            }
          ],
          "options": { "sortBy": [{ "displayName": "Value", "desc": true }] },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] },
              "custom": { "displayMode": "color-background" }
            }
          }
        }
      ]
    }
  infrastructure.json: |
    {
      "title": "Subul — Infrastructure",
      "uid": "subul-infra",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "tags": ["subul", "infrastructure"],
      "panels": [
        {
          "id": 1,
          "type": "gauge",
          "title": "CPU Usage %",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 5 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "Memory Usage %",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 5 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Memory"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 75 }, { "color": "red", "value": 90 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Disk Usage %",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 5 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"})) * 100",
              "legendFormat": "Disk /"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "PostgreSQL",
          "gridPos": { "x": 18, "y": 0, "w": 3, "h": 5 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "pg_up", "legendFormat": "" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Redis",
          "gridPos": { "x": 21, "y": 0, "w": 3, "h": 5 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "redis_up", "legendFormat": "" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "mappings": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }],
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "CPU Usage Over Time",
          "gridPos": { "x": 0, "y": 5, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU {{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 85 }] }
            }
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Memory Available",
          "gridPos": { "x": 12, "y": 5, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "node_memory_MemAvailable_bytes",
              "legendFormat": "Available"
            },
            {
              "expr": "node_memory_MemTotal_bytes",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 2, "fillOpacity": 5 } }
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Container CPU Usage",
          "gridPos": { "x": 0, "y": 13, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(name) (rate(container_cpu_usage_seconds_total{name!=\"\",name!~\".*_exporter.*\"}[5m])) * 100",
              "legendFormat": "{{name}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "custom": { "lineWidth": 1, "fillOpacity": 0 } }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Container Memory Usage",
          "gridPos": { "x": 12, "y": 13, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(name) (container_memory_working_set_bytes{name!=\"\",name!~\".*_exporter.*\"})",
              "legendFormat": "{{name}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 1, "fillOpacity": 0 } }
          }
        },
        {
          "id": 20,
          "type": "timeseries",
          "title": "PostgreSQL Connections",
          "gridPos": { "x": 0, "y": 21, "w": 8, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "pg_stat_activity_count",
              "legendFormat": "connections"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }
            }
          }
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "Redis Memory Used",
          "gridPos": { "x": 8, "y": 21, "w": 8, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "redis_memory_used_bytes",
              "legendFormat": "used"
            },
            {
              "expr": "redis_memory_max_bytes",
              "legendFormat": "max"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 22,
          "type": "timeseries",
          "title": "NestJS Event Loop Lag",
          "gridPos": { "x": 16, "y": 21, "w": 8, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "nodejs_eventloop_lag_seconds",
              "legendFormat": "event loop lag"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.2 }, { "color": "red", "value": 0.5 }] }
            }
          }
        },
        {
          "id": 23,
          "type": "timeseries",
          "title": "NestJS Heap Usage",
          "gridPos": { "x": 0, "y": 28, "w": 12, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "nodejs_heap_size_used_bytes",
              "legendFormat": "used"
            },
            {
              "expr": "nodejs_heap_size_total_bytes",
              "legendFormat": "total"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 2, "fillOpacity": 8 } }
          }
        },
        {
          "id": 24,
          "type": "timeseries",
          "title": "Network I/O",
          "gridPos": { "x": 12, "y": 28, "w": 12, "h": 7 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device!~\"lo|docker.*\"}[5m])",
              "legendFormat": "rx {{device}}"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{device!~\"lo|docker.*\"}[5m])",
              "legendFormat": "tx {{device}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "Bps", "custom": { "lineWidth": 1 } }
          }
        }
      ]
    }
  logs.json: |
    {
      "title": "Subul — Logs",
      "uid": "subul-logs",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["subul", "logs"],
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values(service)",
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Service"
          },
          {
            "name": "level",
            "type": "custom",
            "options": [
              { "text": "All", "value": "" },
              { "text": "error", "value": "error" },
              { "text": "warn", "value": "warn" },
              { "text": "info", "value": "info" },
              { "text": "debug", "value": "debug" }
            ],
            "multi": false,
            "label": "Level",
            "current": { "text": "All", "value": "" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Application Logs",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 18 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "{service=~\"$service\"} |= \"\" | level=~\"$level|.*\"",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Log Rate by Level",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 7 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "sum by(level) (rate({service=~\"$service\"}[5m]))",
              "legendFormat": "{{level}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "error" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "warn" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "info" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] }
            ]
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Error Rate by Service",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 7 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "sum by(service) (rate({service=~\"$service\", level=\"error\"}[5m]))",
              "legendFormat": "{{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 2 } }
          }
        },
        {
          "id": 4,
          "type": "logs",
          "title": "Errors Only",
          "gridPos": { "x": 0, "y": 25, "w": 24, "h": 10 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "{service=~\"$service\", level=\"error\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ]
    }
  revenue-vs-cost.json: |
    {
      "title": "Subul — Revenue vs AI Cost",
      "uid": "subul-revenue",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "5m",
      "time": { "from": "now-30d", "to": "now" },
      "tags": ["subul", "revenue", "cost"],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Revenue (30d)",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(increase(stripe_revenue_usd_total[30d]))", "legendFormat": "" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": { "fixedColor": "green", "mode": "fixed" }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "AI Spend (30d)",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(azure_openai_cost_usd_total[30d])) + sum(increase(deepgram_cost_usd_total[30d])) + sum(increase(cartesia_cost_usd_total[30d])) + sum(increase(azure_search_cost_usd_total[30d]))",
              "legendFormat": ""
            }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "color": { "fixedColor": "red", "mode": "fixed" }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "AI Cost % of Revenue",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(sum(increase(azure_openai_cost_usd_total[30d])) + sum(increase(deepgram_cost_usd_total[30d])) + sum(increase(cartesia_cost_usd_total[30d])) + sum(increase(azure_search_cost_usd_total[30d]))) / sum(increase(stripe_revenue_usd_total[30d])) * 100",
              "legendFormat": ""
            }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 20 }, { "color": "red", "value": 40 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Payments (30d) — Succeeded",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(increase(stripe_payment_intents_total{status=\"succeeded\"}[30d]))", "legendFormat": "" }],
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "short", "decimals": 0, "color": { "mode": "palette-classic" } } }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Payments (30d) — Failed",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(increase(stripe_payment_intents_total{status=\"failed\"}[30d]))", "legendFormat": "" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Revenue per AI Dollar",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(stripe_revenue_usd_total[30d])) / (sum(increase(azure_openai_cost_usd_total[30d])) + sum(increase(deepgram_cost_usd_total[30d])) + sum(increase(cartesia_cost_usd_total[30d])) + sum(increase(azure_search_cost_usd_total[30d])))",
              "legendFormat": ""
            }
          ],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 5 }, { "color": "green", "value": 10 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Revenue vs AI Cost (daily)",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 10 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(stripe_revenue_usd_total[1d]))",
              "legendFormat": "Revenue"
            },
            {
              "expr": "sum(increase(azure_openai_cost_usd_total[1d])) + sum(increase(deepgram_cost_usd_total[1d])) + sum(increase(cartesia_cost_usd_total[1d])) + sum(increase(azure_search_cost_usd_total[1d]))",
              "legendFormat": "AI Cost"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "currencyUSD", "custom": { "lineWidth": 2, "fillOpacity": 10 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Revenue" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "AI Cost" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Revenue by Plan",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(plan_slug) (rate(stripe_revenue_usd_total[1h])) * 3600",
              "legendFormat": "{{plan_slug}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "currencyUSD", "custom": { "lineWidth": 2, "fillOpacity": 8, "stacking": { "mode": "normal" } } }
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "AI Spend Breakdown by Provider (daily)",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            { "expr": "sum(increase(azure_openai_cost_usd_total[1d]))", "legendFormat": "OpenAI" },
            { "expr": "sum(increase(deepgram_cost_usd_total[1d]))", "legendFormat": "Deepgram" },
            { "expr": "sum(increase(cartesia_cost_usd_total[1d]))", "legendFormat": "Cartesia" },
            { "expr": "sum(increase(azure_search_cost_usd_total[1d]))", "legendFormat": "Azure Search" }
          ],
          "fieldConfig": {
            "defaults": { "unit": "currencyUSD", "custom": { "lineWidth": 2, "fillOpacity": 10, "stacking": { "mode": "normal" } } }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "AI Cost % of Revenue (rolling)",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(sum(increase(azure_openai_cost_usd_total[7d])) + sum(increase(deepgram_cost_usd_total[7d])) + sum(increase(cartesia_cost_usd_total[7d])) + sum(increase(azure_search_cost_usd_total[7d]))) / sum(increase(stripe_revenue_usd_total[7d])) * 100",
              "legendFormat": "7-day rolling"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "lineWidth": 2, "fillOpacity": 15 },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 20 }, { "color": "red", "value": 40 }] }
            }
          }
        }
      ]
    }
  subul-overview.json: |
    {
      "title": "Subul — Platform Overview",
      "uid": "subul-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["subul", "overview"],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Services UP",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "count(probe_success == 1)",
              "legendFormat": "UP"
            }
          ],
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Services DOWN",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "count(probe_success == 0) or vector(0)",
              "legendFormat": "DOWN"
            }
          ],
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "AI Cost Today (USD)",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(azure_openai_cost_usd_total[24h])) + sum(increase(deepgram_cost_usd_total[24h])) + sum(increase(cartesia_cost_usd_total[24h])) + sum(increase(azure_search_cost_usd_total[24h]))",
              "legendFormat": "Cost"
            }
          ],
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 25 },
                  { "color": "red", "value": 50 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "API Requests (5m)",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(agent_proxy_requests_total[5m])) * 300",
              "legendFormat": "Requests"
            }
          ],
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Active Alerts",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\"}) or vector(0)",
              "legendFormat": "Firing"
            }
          ],
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 6,
          "type": "table",
          "title": "Service Health",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 10 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "probe_success",
              "instant": true,
              "legendFormat": "{{instance}}",
              "refId": "A"
            },
            {
              "expr": "probe_duration_seconds",
              "instant": true,
              "legendFormat": "{{instance}}",
              "refId": "B"
            }
          ],
          "options": {
            "sortBy": [{ "displayName": "Value #A", "desc": false }]
          },
          "fieldConfig": {
            "defaults": { "custom": { "filterable": true } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value #A" },
                "properties": [
                  { "id": "displayName", "value": "Status" },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
                    ]
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #B" },
                "properties": [
                  { "id": "displayName", "value": "Latency" },
                  { "id": "unit", "value": "s" },
                  { "id": "decimals", "value": 3 }
                ]
              }
            ]
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "API Request Rate (all agents)",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 10 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by(agent) (rate(azure_openai_requests_total[5m]))",
              "legendFormat": "{{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Probe Latency P95 (ms)",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "probe_duration_seconds * 1000",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "lineWidth": 1, "fillOpacity": 5 }
            }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "AI Cost Rate (USD/hr)",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(azure_openai_cost_usd_total[5m])) * 3600",
              "legendFormat": "OpenAI"
            },
            {
              "expr": "sum(rate(deepgram_cost_usd_total[5m])) * 3600",
              "legendFormat": "Deepgram"
            },
            {
              "expr": "sum(rate(cartesia_cost_usd_total[5m])) * 3600",
              "legendFormat": "Cartesia"
            },
            {
              "expr": "sum(rate(azure_search_cost_usd_total[5m])) * 3600",
              "legendFormat": "Azure Search"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": { "lineWidth": 2, "fillOpacity": 10, "stacking": { "mode": "normal" } }
            }
          }
        }
      ]
    }
