global:
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${MAIL_FROM}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASS}'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'email-admin'
  routes:
    - match:
        severity: critical
      receiver: 'email-admin'
      repeat_interval: 15m

receivers:
  - name: 'email-admin'
    email_configs:
      - to: '${ADMIN_ALERT_EMAIL:-admin@subul.io}'
        send_resolved: true
        html: |
          {{ range .Alerts }}
          <b>{{ .Annotations.summary }}</b><br>
          Status: {{ .Status }}<br>
          {{ if .Annotations.description }}{{ .Annotations.description }}<br>{{ end }}
          Started: {{ .StartsAt.Format "2006-01-02 15:04 UTC" }}<br>
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
