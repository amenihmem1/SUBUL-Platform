x-backend-service: &backend-service
  build:
    context: ./backend
  env_file:
    - ./.env
  environment: &backend-environment
    CUSTOM_EMOTION_MODEL_DIR: /app/data/models/emotion/efficientnet_b3_20260425_053142
    DATABASE_URL: ""
    INTERVIEW_SERVICE_URL: http://interview-service:8000
  volumes:
    - ./backend/data:/app/data
  restart: unless-stopped

services:
  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8000:8000"
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - interview-service
      - calendar-service
      - analytics-service
      - media-service
      - reporting-service
    restart: unless-stopped

  interview-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/interview/Dockerfile
    ports:
      - "8200:8000"

  calendar-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/calendar/Dockerfile
    ports:
      - "8201:8000"

  analytics-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/analytics/Dockerfile
    ports:
      - "8202:8000"

  media-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/media/Dockerfile
    ports:
      - "8203:8000"

  reporting-service:
    <<: *backend-service
    build:
      context: ./backend
      dockerfile: services/reporting/Dockerfile
    ports:
      - "8204:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:8080
        NEXT_PUBLIC_REPORT_SHARE_BASE_URL: http://localhost:8080
    environment:
      RH_API_BASE_URL: http://api-gateway:8000
      NEXT_PUBLIC_APP_URL: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      - api-gateway
    restart: unless-stopped
