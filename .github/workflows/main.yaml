name: CICD-subul

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: subul-frontend-containerapp
  cancel-in-progress: true

env:
  AZURE_CLIENT_ID: d8a060e5-9998-4fe0-ab5e-3397e6260708
  AZURE_TENANT_ID: c1e711d0-76ef-4c9e-a6e3-5d437a303e7b
  AZURE_SUBSCRIPTION_ID: 8297b1d9-1d89-424c-8596-dc314362fd7a
  AZURE_RESOURCE_GROUP: gr-subul
  AZURE_ACR_NAME: acrsubul2026
  AZURE_ACR_LOGIN_SERVER: acrsubul2026.azurecr.io
  AZURE_CONTAINER_APP: subul-frontend
  BACKEND_URL: https://subul-api.bravesand-e5d986f3.francecentral.azurecontainerapps.io
  HR_COACH_URL: https://hr-coach-frontend.bravesand-e5d986f3.francecentral.azurecontainerapps.io
  TECHNICAL_COACH_URL: https://technical-coach-frontend.bravesand-e5d986f3.francecentral.azurecontainerapps.io

jobs:
  deploy-frontend:
    name: Build and Deploy Frontend to Azure Container Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Build frontend image in ACR
        run: |
          az acr build \
            --registry "${{ env.AZURE_ACR_NAME }}" \
            --image "subul-frontend:${{ github.sha }}" \
            --image "subul-frontend:latest" \
            --file Dockerfile \
            --build-arg NEXT_PUBLIC_BACKEND_URL="${{ env.BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ env.BACKEND_URL }}" \
            --build-arg BACKEND_URL="${{ env.BACKEND_URL }}" \
            --build-arg BACKEND_INTERNAL_URL="${{ env.BACKEND_URL }}" \
            --build-arg HR_COACH_INTERNAL_URL="${{ env.HR_COACH_URL }}" \
            --build-arg TECHNICAL_COACH_INTERNAL_URL="${{ env.TECHNICAL_COACH_URL }}" \
            --build-arg NEXT_PUBLIC_HR_COACH_URL="/hr-coach-app" \
            --build-arg NEXT_PUBLIC_TECHNICAL_COACH_URL="/technical-coach-app" \
            --build-arg NEXT_PUBLIC_DEEPGRAM_API_KEY="${{ secrets.NEXT_PUBLIC_DEEPGRAM_API_KEY }}" \
            --build-arg NEXT_PUBLIC_CARTESIA_API_KEY="${{ secrets.NEXT_PUBLIC_CARTESIA_API_KEY }}" \
            ./frontend

      - name: Deploy frontend Container App
        run: |
          az containerapp update \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_CONTAINER_APP }}" \
            --image "${{ env.AZURE_ACR_LOGIN_SERVER }}/subul-frontend:${{ github.sha }}" \
            --set-env-vars \
              DEPLOYMENT_STAMP="github-${{ github.run_id }}-${{ github.run_attempt }}" \
              NEXT_PUBLIC_BACKEND_URL="${{ env.BACKEND_URL }}" \
              NEXT_PUBLIC_API_URL="${{ env.BACKEND_URL }}" \
              BACKEND_URL="${{ env.BACKEND_URL }}" \
              BACKEND_INTERNAL_URL="${{ env.BACKEND_URL }}" \
              HR_COACH_INTERNAL_URL="${{ env.HR_COACH_URL }}" \
              TECHNICAL_COACH_INTERNAL_URL="${{ env.TECHNICAL_COACH_URL }}" \
              NEXT_PUBLIC_HR_COACH_URL="/hr-coach-app" \
              NEXT_PUBLIC_TECHNICAL_COACH_URL="/technical-coach-app"

      - name: Verify deployment
        run: |
          az containerapp show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_CONTAINER_APP }}" \
            --query "{latest:properties.latestRevisionName,ready:properties.latestReadyRevisionName,status:properties.runningStatus,fqdn:properties.configuration.ingress.fqdn}" \
            --output table
