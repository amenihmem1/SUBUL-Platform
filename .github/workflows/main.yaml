name: CICD-subul

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY_FRONTEND: frontend-ecr-subul-main
  ECR_REPOSITORY_BACKEND: backend-ecr-subul-main
  ECR_REPOSITORY_AGENTS: agents-ecr-subul-main
  K8S_NAMESPACE: default
  PRIMARY_ACCOUNT_ID: "014498640042"
  PRIMARY_EKS_CLUSTER: subul-main-cluster
  PRIMARY_GITHUB_OIDC_ROLE: subul-github-oicd-role

  AZURE_RESOURCE_GROUP: subul-rg
  AZURE_AKS_CLUSTER: subulaks
  AZURE_FRONTEND_REGISTRY_NAME: subulacrfrontend
  AZURE_FRONTEND_REGISTRY_LOGIN_SERVER: subulacrfrontend.azurecr.io
  AZURE_BACKEND_REGISTRY_NAME: subulacrbackend
  AZURE_BACKEND_REGISTRY_LOGIN_SERVER: subulacrbackend.azurecr.io

# ════════════════════════════════════════════════════════════════════
# JOB 0 — Detect what actually changed
# ════════════════════════════════════════════════════════════════════
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend:   ${{ steps.filter.outputs.frontend }}
      backend:    ${{ steps.filter.outputs.backend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      agents:     ${{ steps.filter.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/api/src/**'
              - 'backend/api/package*.json'
              - 'backend/api/Dockerfile'
              - 'backend/api/docker-entrypoint.sh'
              - '!backend/api/src/migrations/**'
            migrations:
              - 'backend/api/src/migrations/**'
            agents:
              - 'backend/agents/**'

# ════════════════════════════════════════════════════════════════════
# JOB 1 — Image tag (always)
# ════════════════════════════════════════════════════════════════════
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.vars.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT

# ════════════════════════════════════════════════════════════════════
# JOB 2 — Build & push Frontend  (only when frontend/** changed)
# ════════════════════════════════════════════════════════════════════
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [changes, prepare]
    if: needs.changes.outputs.frontend == 'true'
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.PRIMARY_ACCOUNT_ID }}:role/${{ env.PRIMARY_GITHUB_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Frontend
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: d8a060e5-9998-4fe0-ab5e-3397e6260708
          tenant-id: c1e711d0-76ef-4c9e-a6e3-5d437a303e7b
          subscription-id: 8297b1d9-1d89-424c-8596-dc314362fd7a

      - name: Login to Azure ACR
        run: |
          az acr login --name ${{ env.AZURE_FRONTEND_REGISTRY_NAME }}

      - name: Build Frontend image
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg BACKEND_URL="${{ secrets.BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_BACKEND_URL="${{ secrets.NEXT_PUBLIC_BACKEND_URL }}" \
            --build-arg NEXT_PUBLIC_DEEPGRAM_API_KEY="${{ secrets.NEXT_PUBLIC_DEEPGRAM_API_KEY }}" \
            --build-arg NEXT_PUBLIC_CARTESIA_API_KEY="${{ secrets.NEXT_PUBLIC_CARTESIA_API_KEY }}" \
            -t subul-frontend:$IMAGE_TAG ./frontend

      - name: Push Frontend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag subul-frontend:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
          docker tag subul-frontend:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest

      - name: Push Frontend to Azure ACR
        run: |
          docker tag subul-frontend:$IMAGE_TAG ${{ env.AZURE_FRONTEND_REGISTRY_LOGIN_SERVER }}/frontend:$IMAGE_TAG
          docker tag subul-frontend:$IMAGE_TAG ${{ env.AZURE_FRONTEND_REGISTRY_LOGIN_SERVER }}/frontend:latest
          docker push ${{ env.AZURE_FRONTEND_REGISTRY_LOGIN_SERVER }}/frontend:$IMAGE_TAG
          docker push ${{ env.AZURE_FRONTEND_REGISTRY_LOGIN_SERVER }}/frontend:latest

# ════════════════════════════════════════════════════════════════════
# JOB 3 — Build & push Backend  (backend code OR migrations changed)
# ════════════════════════════════════════════════════════════════════
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [changes, prepare]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.migrations == 'true'
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      # ── Supply-chain guard ─────────────────────────────────────────────
      # Fails the build if any known backdoor / destructive signature from the
      # 2026-07-03 incident reappears in the backend source. Prevents silent
      # re-introduction of the auto-promote-admin backdoor, the paywall bypass,
      # or the mass-delete ("nuke") endpoints.
      - name: Guard against known backdoor signatures
        run: |
          PATTERN='ENSURE_ADMIN_EMAILS|ensure-admin|heal-subscriptions|@Delete\(.nuke.\)|nukeAllContent|content/nuke|deleteAllCertifications|content/certifications/all'
          if grep -REn "$PATTERN" backend/api/src backend/api/Dockerfile backend/api/docker-entrypoint.sh backend/api/package.json; then
            echo "::error::Known backdoor/destructive signature detected in backend source — build blocked. See FORENSIC_ANALYSIS.md."
            exit 1
          fi
          echo "✅ No known backdoor signature found in backend source."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.PRIMARY_ACCOUNT_ID }}:role/${{ env.PRIMARY_GITHUB_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Backend
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: d8a060e5-9998-4fe0-ab5e-3397e6260708
          tenant-id: c1e711d0-76ef-4c9e-a6e3-5d437a303e7b
          subscription-id: 8297b1d9-1d89-424c-8596-dc314362fd7a

      - name: Login to Azure ACR
        run: az acr login --name ${{ env.AZURE_BACKEND_REGISTRY_NAME }}

      - name: Build Backend image
        run: |
          docker build -f backend/api/Dockerfile \
            -t subul-backend:$IMAGE_TAG ./backend

      - name: Verify seed files in image
        run: |
          docker run --rm --entrypoint sh subul-backend:$IMAGE_TAG -c \
            "test -f /app/courses.json && test -f /app/certif_courses.json"

      - name: Push Backend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag subul-backend:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          docker tag subul-backend:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest

      - name: Push Backend to Azure ACR
        run: |
          docker tag subul-backend:$IMAGE_TAG ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/backend:$IMAGE_TAG
          docker tag subul-backend:$IMAGE_TAG ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/backend:latest
          docker push ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/backend:$IMAGE_TAG
          docker push ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/backend:latest

# ════════════════════════════════════════════════════════════════════
# JOB 4 — Build & push Agents  (only when backend/agents/** changed)
# ════════════════════════════════════════════════════════════════════
  build-agents:
    name: Build Agents
    runs-on: ubuntu-latest
    needs: [changes, prepare]
    if: needs.changes.outputs.agents == 'true'
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.PRIMARY_ACCOUNT_ID }}:role/${{ env.PRIMARY_GITHUB_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Agents
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: d8a060e5-9998-4fe0-ab5e-3397e6260708
          tenant-id: c1e711d0-76ef-4c9e-a6e3-5d437a303e7b
          subscription-id: 8297b1d9-1d89-424c-8596-dc314362fd7a

      - name: Login to Azure ACR
        run: az acr login --name ${{ env.AZURE_BACKEND_REGISTRY_NAME }}

      - name: Build all agents
        run: |
          for target in quiz-agent roadmap-agent cv-booster-agent coach-agent cloud-tutor-agent job-search-agent; do
            name=$(echo $target | sed 's/-agent//')
            docker build -f backend/agents/Dockerfile \
              --target $target \
              -t subul-agents-$name:$IMAGE_TAG ./backend/agents
          done

      - name: Push agents to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          declare -A MAP=(
            [quiz]=quiz [roadmap]=roadmap [cv-booster]=cv
            [coach]=coach [cloud-tutor]=cloudtutor [job-search]=jobsearch
          )
          for name in quiz roadmap cv-booster coach cloud-tutor job-search; do
            tag=${MAP[$name]}
            docker tag subul-agents-$name:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:$tag-$IMAGE_TAG
            docker tag subul-agents-$name:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:$tag-latest
            docker push $ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:$tag-$IMAGE_TAG
            docker push $ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:$tag-latest
          done

      - name: Push agents to Azure ACR
        run: |
          declare -A MAP=(
            [quiz]=quiz [roadmap]=roadmap [cv-booster]=cv
            [coach]=coach [cloud-tutor]=cloudtutor [job-search]=jobsearch
          )
          for name in quiz roadmap cv-booster coach cloud-tutor job-search; do
            tag=${MAP[$name]}
            docker tag subul-agents-$name:$IMAGE_TAG ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:$tag-$IMAGE_TAG
            docker tag subul-agents-$name:$IMAGE_TAG ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:$tag-latest
            docker push ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:$tag-$IMAGE_TAG
            docker push ${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:$tag-latest
          done

# ════════════════════════════════════════════════════════════════════
# JOB 5a — Run Migrations on AWS EKS  (BEFORE deploy, migration-only)
# ════════════════════════════════════════════════════════════════════
  migrate-aws:
    name: Run Migrations (AWS)
    runs-on: ubuntu-latest
    needs: [changes, prepare, build-backend]
    if: needs.changes.outputs.migrations == 'true'
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.PRIMARY_ACCOUNT_ID }}:role/${{ env.PRIMARY_GITHUB_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-MigrateAWS
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.PRIMARY_EKS_CLUSTER }}

      - name: Run migrations as one-off pod (AWS)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          POD_NAME="migration-$IMAGE_TAG"
          kubectl run "$POD_NAME" \
            --image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
            --restart=Never \
            --env-from=secret/app-secrets \
            --command -- sh -c "cd /app && npm run migration:run"

          echo "⏳ Waiting for migration pod to complete..."
          kubectl wait pod/"$POD_NAME" --for=condition=Ready --timeout=30s || true
          kubectl wait pod/"$POD_NAME" --for=jsonpath='{.status.phase}'=Succeeded --timeout=120s || {
            echo "❌ Migration pod failed. Logs:"
            kubectl logs "$POD_NAME"
            kubectl delete pod "$POD_NAME" --ignore-not-found=true
            exit 1
          }

          echo "✅ Migrations succeeded. Logs:"
          kubectl logs "$POD_NAME"
          kubectl delete pod "$POD_NAME" --ignore-not-found=true

# ════════════════════════════════════════════════════════════════════
# JOB 5b — Run Migrations on Azure AKS  (BEFORE deploy)
# ════════════════════════════════════════════════════════════════════
  migrate-azure:
    name: Run Migrations (Azure)
    runs-on: ubuntu-latest
    needs: [changes, prepare, build-backend]
    if: needs.changes.outputs.migrations == 'true'
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: d8a060e5-9998-4fe0-ab5e-3397e6260708
          tenant-id: c1e711d0-76ef-4c9e-a6e3-5d437a303e7b
          subscription-id: 8297b1d9-1d89-424c-8596-dc314362fd7a

      - name: Set kubeconfig AKS
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_AKS_CLUSTER }} \
            --overwrite-existing

      - name: Run migrations as one-off pod (Azure)
        run: |
          POD_NAME="migration-$IMAGE_TAG"
          kubectl run "$POD_NAME" \
            --image=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/backend:$IMAGE_TAG \
            --restart=Never \
            --env-from=secret/app-secrets \
            --command -- sh -c "cd /app && npm run migration:run"

          echo "⏳ Waiting for migration pod..."
          kubectl wait pod/"$POD_NAME" --for=condition=Ready --timeout=30s || true
          kubectl wait pod/"$POD_NAME" --for=jsonpath='{.status.phase}'=Succeeded --timeout=120s || {
            echo "❌ Migration pod failed. Logs:"
            kubectl logs "$POD_NAME"
            kubectl delete pod "$POD_NAME" --ignore-not-found=true
            exit 1
          }

          echo "✅ Migrations succeeded. Logs:"
          kubectl logs "$POD_NAME"
          kubectl delete pod "$POD_NAME" --ignore-not-found=true

# ════════════════════════════════════════════════════════════════════
# JOB 6 — Deploy to AWS EKS
# ════════════════════════════════════════════════════════════════════
  deploy-aws:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: [changes, prepare, build-frontend, build-backend, build-agents, migrate-aws]
    # Run if no job failed/cancelled (skipped jobs are fine)
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (
        needs.changes.outputs.frontend   == 'true' ||
        needs.changes.outputs.backend    == 'true' ||
        needs.changes.outputs.migrations == 'true' ||
        needs.changes.outputs.agents     == 'true'
      )
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.PRIMARY_ACCOUNT_ID }}:role/${{ env.PRIMARY_GITHUB_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-DeployAWS
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.PRIMARY_EKS_CLUSTER }}

      - name: Ensure namespace
        run: |
          kubectl get namespace "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1 || \
            kubectl create namespace "${{ env.K8S_NAMESPACE }}"

      - name: Detect backend deployment name
        id: detect-backend
        run: |
          NS="${{ env.K8S_NAMESPACE }}"
          NAME=$(kubectl get deployment/backend -n "$NS" -o name 2>/dev/null | cut -d/ -f2 || \
                 kubectl get deployment -n "$NS" -l app=backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || \
                 echo "")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Apply K8s manifests + secrets
        run: |
          # Grafana secrets
          kubectl create secret generic grafana-secrets \
            --from-literal=GRAFANA_ADMIN_USER="${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}" \
            --from-literal=GRAFANA_ADMIN_PASSWORD="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap grafana-config \
            --from-literal=GRAFANA_ROOT_URL="https://monitoring.subul.uk" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f monitoring/k8s/grafana-configmap-provisioning.yml
          kubectl apply -f monitoring/k8s/grafana-dashboards-configmap.yml

          # App secrets
          kubectl create secret generic app-secrets \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=AWS_DEFAULT_REGION="${{ env.AWS_REGION }}" \
            --from-literal=S3_BUCKET_NAME="${{ secrets.PRIMARY_S3_BUCKET_NAME }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_CHAT_ENDPOINT="${{ secrets.AZURE_OPENAI_CHAT_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="${{ secrets.AZURE_OPENAI_API_VERSION }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}" \
            --from-literal=AZURE_AI_EMBED_DIMENSIONS="1536" \
            --from-literal=AZURE_SEARCH_ENDPOINT="${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
            --from-literal=AZURE_SEARCH_API_KEY="${{ secrets.AZURE_SEARCH_API_KEY }}" \
            --from-literal=AZURE_SEARCH_INDEX_NAME="${{ secrets.AZURE_SEARCH_INDEX_NAME }}" \
            --from-literal=AZURE_COSMOS_ENDPOINT="${{ secrets.AZURE_COSMOS_ENDPOINT }}" \
            --from-literal=AZURE_COSMOS_KEY="${{ secrets.AZURE_COSMOS_KEY }}" \
            --from-literal=AZURE_COSMOS_DATABASE_NAME="${{ secrets.AZURE_COSMOS_DATABASE_NAME }}" \
            --from-literal=AZURE_COSMOS_QUIZ_CONTAINER_NAME="${{ secrets.AZURE_COSMOS_QUIZ_CONTAINER_NAME }}" \
            --from-literal=NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            --from-literal=CORS_ORIGINS="${{ secrets.CORS_ORIGINS || 'https://app.subul.uk,https://subul.uk,https://www.subul.uk' }}" \
            --from-literal=BACKEND_URL="${{ secrets.BACKEND_URL }}" \
            --from-literal=SMTP_HOST="${{ secrets.SMTP_HOST || 'email-smtp.eu-central-1.amazonaws.com' }}" \
            --from-literal=SMTP_PORT="${{ secrets.SMTP_PORT || '587' }}" \
            --from-literal=SMTP_SECURE="${{ secrets.SMTP_SECURE || 'false' }}" \
            --from-literal=SMTP_USER="${{ secrets.SMTP_USER }}" \
            --from-literal=SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            --from-literal=MAIL_FROM="${{ secrets.MAIL_FROM }}" \
            --from-literal=MAIL_FROM_NAME="${{ secrets.MAIL_FROM_NAME || 'Subul Platform' }}" \
            --from-literal=DB_HOST="${{ secrets.DB_HOST }}" \
            --from-literal=DB_PORT="${{ secrets.DB_PORT }}" \
            --from-literal=DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            --from-literal=DB_NAME="${{ secrets.DB_NAME }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            --from-literal=BACKEND_INTERNAL_URL="http://backend-service:80" \
            --from-literal=QUIZ_AGENT_URL="http://agent-quiz:8001" \
            --from-literal=CV_BOOSTER_AGENT_URL="http://agent-cv-booster:8003" \
            --from-literal=ROADMAP_AGENT_URL="http://agent-roadmap:8002" \
            --from-literal=JOB_SEARCH_AGENT_URL="http://agent-job-search:8005" \
            --from-literal=COACH_AGENT_URL="http://agent-coach:8004" \
            --from-literal=CLOUD_TUTOR_AGENT_URL="http://agent-cloud-tutor:8000" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Per-agent secrets
          kubectl create secret generic agent-quiz-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.QUIZ_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.QUIZ_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_COSMOS_CONTAINER_NAME="AgentQuiz" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-roadmap-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.ROADMAP_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.ROADMAP_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_COSMOS_ROADMAP_CONTAINER_NAME="AgentRoadmap" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-cv-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.CV_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.CV_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_DEPLOYMENT_VISION="gpt-4o" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-coach-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.COACH_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.COACH_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_SEARCH_INDEX_NAME="indexaccompagningagent" \
            --from-literal=DEEPGRAM_API_KEY="${{ secrets.COACH_DEEPGRAM_API_KEY }}" \
            --from-literal=CARTESIA_API_KEY="${{ secrets.COACH_CARTESIA_API_KEY }}" \
            --from-literal=AZURE_COSMOS_CONTAINER_NAME="AccompanyingSessions" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-tutor-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.TUTOR_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.TUTOR_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_CHAT_DEPLOYMENT="gpt-4o" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small-2" \
            --from-literal=AZURE_STORAGE_ACCOUNT_NAME="${{ secrets.TUTOR_AZURE_STORAGE_ACCOUNT_NAME }}" \
            --from-literal=AZURE_STORAGE_ACCOUNT_KEY="${{ secrets.TUTOR_AZURE_STORAGE_ACCOUNT_KEY }}" \
            --from-literal=AZURE_BLOB_CONTAINER="agent-tutor-stockage-artifacts" \
            --from-literal=VITE_DEEPGRAM_API_KEY="${{ secrets.TUTOR_DEEPGRAM_API_KEY }}" \
            --from-literal=CARTESIA_API_KEY="${{ secrets.TUTOR_CARTESIA_API_KEY }}" \
            --from-literal=AZURE_COSMOS_CONTAINER_NAME="AgentTutor" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-jobsearch-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.JOBSEARCH_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.JOBSEARCH_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-08-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_COSMOS_JOBS_CONTAINER="AgentSearchJobs" \
            --from-literal=HF_TOKEN="${{ secrets.JOBSEARCH_HF_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Checkout k8s manifests
        uses: actions/checkout@v4
        with:
          repository: SMARTOVATEAI/infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo
          ref: feature/azure-tertiary-backup-francecentral

      - name: Apply base manifests + monitoring
        run: |
          kubectl apply -k infra-repo/k8s-subul/overlays/main/
          kubectl apply -f monitoring/k8s/prometheus-config.yml
          kubectl apply -f monitoring/k8s/prometheus-deployment.yml
          kubectl apply -f monitoring/k8s/blackbox-exporter.yml
          kubectl apply -f monitoring/k8s/grafana-deployment.yml
          kubectl delete ingress grafana-ingress --ignore-not-found=true

      - name: Enforce backend availability
        run: |
          kubectl patch deployment backend --type=strategic -p '{
            "spec": {"template": {"spec": {"containers": [{
              "name": "backend",
              "resources": {
                "requests": {"cpu": "500m", "memory": "512Mi"},
                "limits": {"cpu": "2", "memory": "2Gi"}
              },
              "readinessProbe": {
                "httpGet": {"path": "/api/health", "port": 3001},
                "initialDelaySeconds": 20, "periodSeconds": 10,
                "timeoutSeconds": 5, "failureThreshold": 6
              },
              "livenessProbe": {
                "httpGet": {"path": "/api/health", "port": 3001},
                "initialDelaySeconds": 90, "periodSeconds": 30,
                "timeoutSeconds": 10, "failureThreshold": 3
              }
            }]}}}
          }'
          kubectl patch hpa backend-hpa --type=merge \
            -p '{"spec":{"minReplicas":2,"maxReplicas":5}}'

      # ── Conditional image updates ──────────────────────────────
      - name: Update Frontend image
        if: needs.changes.outputs.frontend == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl set image deployment/frontend \
            frontend=$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
          kubectl rollout status deployment/frontend --timeout=10m

      - name: Update Backend image
        if: (needs.changes.outputs.backend == 'true' || needs.changes.outputs.migrations == 'true') && steps.detect-backend.outputs.name != ''
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          BACKEND_DEPLOYMENT="${{ steps.detect-backend.outputs.name }}"
          kubectl set image deployment/"$BACKEND_DEPLOYMENT" \
            backend=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          kubectl set env deployment/"$BACKEND_DEPLOYMENT" \
            CV_BOOSTER_URL=http://agent-cv-booster:8003 \
            JOB_SEARCH_AGENT_URL=http://agent-job-search:8005 || true
          kubectl rollout status deployment/"$BACKEND_DEPLOYMENT" --timeout=10m

      - name: Update Agent images
        if: needs.changes.outputs.agents == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl set image deployment/agent-quiz \
            agent-quiz=$ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:quiz-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-roadmap \
            agent-roadmap=$ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:roadmap-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-cv-booster \
            agent-cv-booster=$ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:cv-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-coach \
            agent-coach=$ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:coach-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-cloud-tutor \
            agent-cloud-tutor=$ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:cloudtutor-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-job-search \
            agent-job-search=$ECR_REGISTRY/$ECR_REPOSITORY_AGENTS:jobsearch-$IMAGE_TAG || echo "⚠️ skipped"

          # Apply per-agent env secrets
          for dep_secret in "agent-quiz:agent-quiz-secrets" "agent-roadmap:agent-roadmap-secrets" \
              "agent-cv-booster:agent-cv-secrets" "agent-coach:agent-coach-secrets" \
              "agent-cloud-tutor:agent-tutor-secrets" "agent-job-search:agent-jobsearch-secrets"; do
            dep=${dep_secret%%:*}; secret=${dep_secret##*:}
            kubectl set env deployment/$dep --from=secret/$secret || echo "⚠️ $dep env skipped"
          done

      - name: Verify seed logs (non-blocking)
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.migrations == 'true'
        run: |
          BACKEND_DEPLOYMENT="${{ steps.detect-backend.outputs.name }}"
          if [ -n "$BACKEND_DEPLOYMENT" ]; then
            kubectl logs deployment/"$BACKEND_DEPLOYMENT" --tail=500 --all-containers=true 2>/dev/null | \
              grep -E "\[Seed\] Course import complete:|\[Seed\] Labs seed upsert complete\." || \
              echo "⚠️ Seed log pattern not found — non-fatal"
          fi

      - name: Capture logs
        if: always()
        continue-on-error: true
        run: |
          NS="${{ env.K8S_NAMESPACE }}"
          mkdir -p _logs/aws-eks/containers
          kubectl get pods -n $NS -o wide > _logs/aws-eks/pods.txt 2>/dev/null || true
          kubectl get events -n $NS --sort-by='.lastTimestamp' --tail=100 > _logs/aws-eks/events.txt 2>/dev/null || true
          kubectl logs deployment/backend -n $NS --tail=500 --all-containers=true > _logs/aws-eks/backend.log 2>/dev/null || true
          kubectl logs deployment/frontend -n $NS --tail=300 --all-containers=true > _logs/aws-eks/frontend.log 2>/dev/null || true
          for dep in agent-quiz agent-roadmap agent-coach agent-cloud-tutor; do
            kubectl logs deployment/$dep -n $NS --tail=200 --all-containers=true > _logs/aws-eks/containers/$dep.log 2>/dev/null || true
          done

      - name: Upload AWS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-eks-deployment-logs
          path: _logs/aws-eks/

# ════════════════════════════════════════════════════════════════════
# JOB 7 — Deploy to Azure AKS
# ════════════════════════════════════════════════════════════════════
  deploy-azure:
    name: Deploy to Azure AKS
    runs-on: ubuntu-latest
    needs: [changes, prepare, build-frontend, build-backend, build-agents, migrate-azure]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (
        needs.changes.outputs.frontend   == 'true' ||
        needs.changes.outputs.backend    == 'true' ||
        needs.changes.outputs.migrations == 'true' ||
        needs.changes.outputs.agents     == 'true'
      )
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: d8a060e5-9998-4fe0-ab5e-3397e6260708
          tenant-id: c1e711d0-76ef-4c9e-a6e3-5d437a303e7b
          subscription-id: 8297b1d9-1d89-424c-8596-dc314362fd7a

      - name: Set kubeconfig AKS
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_AKS_CLUSTER }} \
            --overwrite-existing

      - name: Ensure namespace
        run: |
          kubectl get namespace "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1 || \
            kubectl create namespace "${{ env.K8S_NAMESPACE }}"

      - name: Detect backend deployment name
        id: detect-backend
        run: |
          NS="${{ env.K8S_NAMESPACE }}"
          NAME=$(kubectl get deployment/backend -n "$NS" -o name 2>/dev/null | cut -d/ -f2 || \
                 kubectl get deployment -n "$NS" -l app=backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || \
                 echo "")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Apply secrets
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_CHAT_ENDPOINT="${{ secrets.AZURE_OPENAI_CHAT_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="${{ secrets.AZURE_OPENAI_API_VERSION }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
            --from-literal=NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            --from-literal=CORS_ORIGINS="${{ secrets.CORS_ORIGINS || 'https://app.subul.uk,https://subul.uk,https://www.subul.uk' }}" \
            --from-literal=BACKEND_URL="${{ secrets.BACKEND_URL }}" \
            --from-literal=AZURE_CLIENT_ID_MAIL="${{ secrets.AZURE_CLIENT_ID_MAIL }}" \
            --from-literal=AZURE_TENANT_ID_MAIL="${{ secrets.AZURE_TENANT_ID_MAIL }}" \
            --from-literal=AZURE_CLIENT_SECRET_MAIL="${{ secrets.AZURE_CLIENT_SECRET_MAIL }}" \
            --from-literal=AZURE_SENDER_EMAIL="${{ secrets.AZURE_SENDER_EMAIL }}" \
            --from-literal=DB_HOST="${{ secrets.AZURE_DB_HOST }}" \
            --from-literal=DB_PORT="${{ secrets.AZURE_DB_PORT }}" \
            --from-literal=DB_USERNAME="${{ secrets.AZURE_DB_USERNAME }}" \
            --from-literal=DB_NAME="${{ secrets.AZURE_DB_NAME }}" \
            --from-literal=DB_PASSWORD="${{ secrets.AZURE_DB_PASSWORD }}" \
            --from-literal=SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            --from-literal=BACKEND_INTERNAL_URL="http://backend-service:80" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic agent-quiz-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.QUIZ_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.QUIZ_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_COSMOS_CONTAINER_NAME="AgentQuiz" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-roadmap-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.ROADMAP_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.ROADMAP_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_COSMOS_ROADMAP_CONTAINER_NAME="AgentRoadmap" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-cv-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.CV_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.CV_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_DEPLOYMENT_VISION="gpt-4o" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-coach-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.COACH_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.COACH_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_SEARCH_INDEX_NAME="indexaccompagningagent" \
            --from-literal=DEEPGRAM_API_KEY="${{ secrets.COACH_DEEPGRAM_API_KEY }}" \
            --from-literal=CARTESIA_API_KEY="${{ secrets.COACH_CARTESIA_API_KEY }}" \
            --from-literal=AZURE_COSMOS_CONTAINER_NAME="AccompanyingSessions" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-tutor-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.TUTOR_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.TUTOR_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_CHAT_DEPLOYMENT="gpt-4o" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small-2" \
            --from-literal=AZURE_STORAGE_ACCOUNT_NAME="${{ secrets.TUTOR_AZURE_STORAGE_ACCOUNT_NAME }}" \
            --from-literal=AZURE_STORAGE_ACCOUNT_KEY="${{ secrets.TUTOR_AZURE_STORAGE_ACCOUNT_KEY }}" \
            --from-literal=AZURE_BLOB_CONTAINER="agent-tutor-stockage-artifacts" \
            --from-literal=VITE_DEEPGRAM_API_KEY="${{ secrets.TUTOR_DEEPGRAM_API_KEY }}" \
            --from-literal=CARTESIA_API_KEY="${{ secrets.TUTOR_CARTESIA_API_KEY }}" \
            --from-literal=AZURE_COSMOS_CONTAINER_NAME="AgentTutor" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic agent-jobsearch-secrets \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.JOBSEARCH_AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.JOBSEARCH_AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_VERSION="2024-08-01-preview" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            --from-literal=AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            --from-literal=AZURE_COSMOS_JOBS_CONTAINER="AgentSearchJobs" \
            --from-literal=HF_TOKEN="${{ secrets.JOBSEARCH_HF_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Login to Azure ACR
        run: |
          az acr login --name ${{ env.AZURE_FRONTEND_REGISTRY_NAME }}
          az acr login --name ${{ env.AZURE_BACKEND_REGISTRY_NAME }}

      - name: Checkout k8s manifests
        uses: actions/checkout@v4
        with:
          repository: SMARTOVATEAI/infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo
          ref: feature/azure-tertiary-backup-francecentral

      - name: Apply base manifests
        run: kubectl apply -k infra-repo/k8s-subul/overlays/azure/

      # ── Conditional image updates ──────────────────────────────
      - name: Update Frontend image
        if: needs.changes.outputs.frontend == 'true'
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.AZURE_FRONTEND_REGISTRY_LOGIN_SERVER }}/frontend:$IMAGE_TAG
          kubectl rollout status deployment/frontend --timeout=10m

      - name: Update Backend image
        if: (needs.changes.outputs.backend == 'true' || needs.changes.outputs.migrations == 'true') && steps.detect-backend.outputs.name != ''
        run: |
          BACKEND_DEPLOYMENT="${{ steps.detect-backend.outputs.name }}"
          kubectl set image deployment/"$BACKEND_DEPLOYMENT" \
            backend=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/backend:$IMAGE_TAG
          kubectl rollout status deployment/"$BACKEND_DEPLOYMENT" --timeout=10m

      - name: Update Agent images
        if: needs.changes.outputs.agents == 'true'
        run: |
          kubectl set image deployment/agent-quiz \
            agent-quiz=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:quiz-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-roadmap \
            agent-roadmap=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:roadmap-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-cv-booster \
            agent-cv-booster=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:cv-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-coach \
            agent-coach=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:coach-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-cloud-tutor \
            agent-cloud-tutor=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:cloudtutor-$IMAGE_TAG || echo "⚠️ skipped"
          kubectl set image deployment/agent-job-search \
            agent-job-search=${{ env.AZURE_BACKEND_REGISTRY_LOGIN_SERVER }}/agents:jobsearch-$IMAGE_TAG || echo "⚠️ skipped"

          for dep_secret in "agent-quiz:agent-quiz-secrets" "agent-roadmap:agent-roadmap-secrets" \
              "agent-cv-booster:agent-cv-secrets" "agent-coach:agent-coach-secrets" \
              "agent-cloud-tutor:agent-tutor-secrets" "agent-job-search:agent-jobsearch-secrets"; do
            dep=${dep_secret%%:*}; secret=${dep_secret##*:}
            kubectl set env deployment/$dep --from=secret/$secret || echo "⚠️ $dep env skipped"
          done

      - name: Capture logs
        if: always()
        continue-on-error: true
        run: |
          NS="${{ env.K8S_NAMESPACE }}"
          mkdir -p _logs/azure-aks/containers
          kubectl get pods -n $NS -o wide > _logs/azure-aks/pods.txt 2>/dev/null || true
          kubectl get events -n $NS --sort-by='.lastTimestamp' --tail=100 > _logs/azure-aks/events.txt 2>/dev/null || true
          kubectl logs deployment/backend -n $NS --tail=500 --all-containers=true > _logs/azure-aks/backend.log 2>/dev/null || true
          kubectl logs deployment/frontend -n $NS --tail=300 --all-containers=true > _logs/azure-aks/frontend.log 2>/dev/null || true
          for dep in agent-quiz agent-roadmap agent-cv-booster agent-coach agent-cloud-tutor agent-job-search; do
            kubectl logs deployment/$dep -n $NS --tail=200 --all-containers=true > _logs/azure-aks/containers/$dep.log 2>/dev/null || true
          done

      - name: Upload Azure logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-aks-deployment-logs
          path: _logs/azure-aks/
