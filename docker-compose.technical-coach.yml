# Subul Technical Coach Integration
# Run with:
#   docker compose -f docker-compose.technical-coach.yml up --build
#
# UI:      http://localhost:8082
# Gateway: http://localhost:8002
#
# The source lives in integrations/technical-coach. Heavy generated folders
# such as node_modules, .next, .venv, and backend/data/models are intentionally
# not copied from D:\technique-agent.

x-technical-backend: &technical-backend
  build:
    context: ./integrations/technical-coach/backend
  env_file:
    - ./integrations/technical-coach/.env
  environment: &technical-backend-env
    PYTHONUNBUFFERED: "1"
    CUSTOM_EMOTION_MODEL_DIR: /app/data/models/emotion/efficientnet_b3_20260425_053142
    DATABASE_URL: ""
  volumes:
    - ./integrations/technical-coach/backend/data:/app/data
  restart: unless-stopped

services:
  technical-coach-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8002:8000"
    volumes:
      - ./integrations/technical-coach/infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - technical-coach-interview
      - technical-coach-media
      - technical-coach-analytics
      - technical-coach-reporting
    restart: unless-stopped

  technical-coach-interview:
    <<: *technical-backend
    build:
      context: ./integrations/technical-coach/backend
      dockerfile: services/interview/Dockerfile

  technical-coach-media:
    <<: *technical-backend
    build:
      context: ./integrations/technical-coach/backend
      dockerfile: services/media/Dockerfile

  technical-coach-analytics:
    <<: *technical-backend
    build:
      context: ./integrations/technical-coach/backend
      dockerfile: services/analytics/Dockerfile

  technical-coach-reporting:
    <<: *technical-backend
    build:
      context: ./integrations/technical-coach/backend
      dockerfile: services/reporting/Dockerfile

  technical-coach-frontend:
    build:
      context: ./integrations/technical-coach/frontend
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:8082
        NEXT_PUBLIC_REPORT_SHARE_BASE_URL: http://localhost:8082
    environment:
      TECH_API_BASE_URL: http://technical-coach-gateway:8000
      STT_LANGUAGE: ${STT_LANGUAGE:-multi}
      STT_PROXY_TIMEOUT_MS: ${STT_PROXY_TIMEOUT_MS:-210000}
      NEXT_PUBLIC_APP_URL: http://localhost:8082
      NEXT_PUBLIC_REPORT_SHARE_BASE_URL: http://localhost:8082
    ports:
      - "8082:8080"
    depends_on:
      - technical-coach-gateway
    restart: unless-stopped
